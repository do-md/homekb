# Engine release pipeline (docs/ARCHITECTURE.md "Distribution").
#
# Trigger: push a tag `engine-v<version>` (must match engine/Cargo.toml
# workspace version) → build + test the four-target matrix → create a GitHub
# release with the artifacts → bump the Homebrew tap and Scoop bucket
# (publish-channels). `workflow_dispatch` runs build + test only
# (validation without publishing).
#
# Artifact names are a contract consumed by install.sh, the Homebrew formula,
# and the Scoop manifest — change the doc before changing them.
#
# publish-channels needs the PACKAGES_PUSH_TOKEN secret: a fine-grained PAT
# with Contents read/write on do-md/homebrew-tap and do-md/scoop-bucket. The
# formula/manifest in those repos are generated here — never hand-edit them.
name: engine-release

on:
  push:
    tags: ["engine-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: homekb-macos-arm64.tar.gz
          # Cross-compiled from the arm64 runner (the shared Intel macos-13
          # queue is unreliably slow). arm64 already tests the same code; an
          # x86_64 host can't execute an x86_64 binary, so this entry only
          # builds — the Apple SDK ships both arch slices, so the cc-built C
          # deps (sqlite-vec, aws-lc-sys) cross-compile cleanly.
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: homekb-macos-x64.tar.gz
            skip_test: true
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: homekb-linux-x64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: homekb-windows-x64.zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
          key: ${{ matrix.target }}

      - name: Test
        if: ${{ !matrix.skip_test }}
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        # COPYFILE_DISABLE: keep bsdtar from serializing macOS extended
        # attributes into AppleDouble ._* members.
        env:
          COPYFILE_DISABLE: "1"
        run: tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.artifact }}" homekb

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/homekb.exe" -DestinationPath "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: engine/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/engine-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches engine version
        run: |
          version=$(grep -m1 '^version' engine/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          tag="${GITHUB_REF_NAME#engine-v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag engine-v$tag does not match engine/Cargo.toml version $version" >&2
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Engine $GITHUB_REF_NAME" \
            --notes "Standalone \`homekb\` engine binaries (self-contained, no runtime dependencies). Install via \`curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.sh | sh\`, Homebrew (\`brew install do-md/tap/homekb\`), or Scoop (\`scoop install homekb\`). See docs/ARCHITECTURE.md \"Distribution\"." \
            dist/*

  # Bump the Homebrew tap and Scoop bucket to the release that was just
  # published. The formula/manifest are fully re-rendered from the artifacts
  # built in this run — the channel repos hold generated files only.
  publish-channels:
    if: startsWith(github.ref, 'refs/tags/engine-v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          cd dist
          for f in homekb-macos-arm64.tar.gz homekb-macos-x64.tar.gz homekb-linux-x64.tar.gz homekb-windows-x64.zip; do
            [ -f "$f" ] || { echo "Missing artifact $f" >&2; exit 1; }
          done
          {
            echo "macos_arm64=$(sha256sum homekb-macos-arm64.tar.gz | cut -d' ' -f1)"
            echo "macos_x64=$(sha256sum homekb-macos-x64.tar.gz | cut -d' ' -f1)"
            echo "linux_x64=$(sha256sum homekb-linux-x64.tar.gz | cut -d' ' -f1)"
            echo "windows_x64=$(sha256sum homekb-windows-x64.zip | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Bump Homebrew tap
        env:
          TOKEN: ${{ secrets.PACKAGES_PUSH_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#engine-v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/do-md/homebrew-tap.git" tap
          cat > tap/Formula/homekb.rb <<EOF
          # HomeKB engine — standalone binary (docs/ARCHITECTURE.md "Distribution").
          # GENERATED by the engine-release workflow (publish-channels) — do not
          # hand-edit; the next release overwrites this file.
          class Homekb < Formula
            desc "Personal markdown knowledge base: compile, semantic search, serve"
            homepage "https://github.com/do-md/homekb"
            version "${version}"

            on_macos do
              on_arm do
                url "${base}/homekb-macos-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_arm64 }}"
              end
              on_intel do
                url "${base}/homekb-macos-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_x64 }}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/homekb-linux-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x64 }}"
              end
            end

            def install
              bin.install "homekb"
            end

            test do
              assert_match "homekb #{version}", shell_output("#{bin}/homekb --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/homekb.rb
          git diff --cached --quiet && { echo "Formula unchanged, skipping push"; exit 0; }
          git commit -m "homekb ${version}"
          git push

      - name: Bump Scoop bucket
        env:
          TOKEN: ${{ secrets.PACKAGES_PUSH_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#engine-v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/do-md/scoop-bucket.git" bucket
          cat > bucket/bucket/homekb.json <<EOF
          {
            "version": "${version}",
            "description": "Personal markdown knowledge base: compile, semantic search, serve",
            "homepage": "https://github.com/do-md/homekb",
            "architecture": {
              "64bit": {
                "url": "${base}/homekb-windows-x64.zip",
                "hash": "${{ steps.sha.outputs.windows_x64 }}"
              }
            },
            "bin": "homekb.exe",
            "checkver": {
              "github": "https://github.com/do-md/homekb",
              "regex": "engine-v([\\\\d.]+)"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/do-md/homekb/releases/download/engine-v\$version/homekb-windows-x64.zip"
                }
              }
            }
          }
          EOF
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/homekb.json
          git diff --cached --quiet && { echo "Manifest unchanged, skipping push"; exit 0; }
          git commit -m "homekb ${version}"
          git push
